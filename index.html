<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de QR</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #080c0a;
            --bg2: #0e1512;
            --card: #121e18;
            --card-hover: #183025;
            --border: #1b3328;
            --fg: #e6f5ec;
            --muted: #6fa088;
            --accent: #00e676;
            --accent2: #00c853;
            --accent-glow: rgba(0,230,118,0.22);
            --danger: #ff5252;
            --warning: #ffab40;
            --piro: #ff6d00;
            --piro2: #e65100;
            --piro-glow: rgba(255,109,0,0.22);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Space Grotesk',sans-serif;
            background:var(--bg); color:var(--fg);
            min-height:100vh; overflow-x:hidden;
        }
        .bg-grid {
            position:fixed; inset:0; z-index:0;
            background-image:
                linear-gradient(rgba(0,230,118,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,230,118,0.025) 1px, transparent 1px);
            background-size:44px 44px;
            animation:gridMove 25s linear infinite;
        }
        @keyframes gridMove { 0%{transform:translate(0,0)} 100%{transform:translate(44px,44px)} }
        .bg-blob { position:fixed; border-radius:50%; filter:blur(130px); z-index:0; pointer-events:none; }
        .bg-blob-1 { width:520px; height:520px; background:rgba(0,230,118,0.06); top:-160px; right:-120px; animation:bF1 14s ease-in-out infinite; }
        .bg-blob-2 { width:400px; height:400px; background:rgba(255,109,0,0.03); bottom:-100px; left:-80px; animation:bF2 18s ease-in-out infinite; }
        @keyframes bF1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-40px,50px) scale(1.12)} }
        @keyframes bF2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(50px,-40px) scale(1.1)} }
        .particula { position:fixed; border-radius:50%; pointer-events:none; z-index:0; background:var(--accent); opacity:0; }
        .contenedor { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:20px 18px 60px; }

        header { text-align:center; padding:36px 0 24px; }
        .logo-icono {
            display:inline-flex; align-items:center; justify-content:center;
            width:68px; height:68px;
            background:linear-gradient(135deg,var(--accent),var(--accent2));
            border-radius:18px; margin-bottom:14px; font-size:30px; color:var(--bg);
            box-shadow:0 0 50px var(--accent-glow);
            animation:logoPulso 3s ease-in-out infinite;
        }
        @keyframes logoPulso { 0%,100%{box-shadow:0 0 40px var(--accent-glow)} 50%{box-shadow:0 0 70px var(--accent-glow),0 0 100px rgba(0,230,118,0.08)} }
        header h1 {
            font-size:clamp(2.2rem,5vw,3.2rem); font-weight:900; letter-spacing:-1.5px;
            background:linear-gradient(135deg,var(--fg) 30%,var(--accent));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1.1;
        }
        header p { color:var(--muted); font-size:1.05rem; margin-top:8px; font-weight:300; }

        .grilla-principal { display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-top:16px; }
        @media(max-width:820px){ .grilla-principal{grid-template-columns:1fr;} }

        .tarjeta { background:var(--card); border:1px solid var(--border); border-radius:22px; padding:26px; transition:border-color 0.3s; }
        .tarjeta:hover { border-color:rgba(0,230,118,0.18); }
        .tarjeta-titulo { font-size:1.1rem; font-weight:700; margin-bottom:18px; display:flex; align-items:center; gap:10px; }
        .tarjeta-titulo i { color:var(--accent); font-size:1rem; }

        .pestannas-tipo { display:flex; gap:6px; margin-bottom:20px; background:var(--bg2); border-radius:14px; padding:5px; }
        .pestanna {
            flex:1; padding:12px 6px; text-align:center; border-radius:10px; cursor:pointer;
            font-size:0.78rem; font-weight:600; color:var(--muted); transition:all 0.3s;
            border:none; background:none; font-family:'Space Grotesk',sans-serif; user-select:none;
        }
        .pestanna:hover { color:var(--fg); background:rgba(255,255,255,0.04); }
        .pestanna.activa { background:var(--accent); color:var(--bg); box-shadow:0 2px 14px var(--accent-glow); }
        .pestanna i { display:block; font-size:1.1rem; margin-bottom:5px; }

        .panel-entrada { display:none; }
        .panel-entrada.activa { display:block; animation:panelAparece 0.35s ease-out; }
        @keyframes panelAparece { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

        .grupo-form { margin-bottom:16px; }
        .grupo-form label {
            display:block; font-size:0.8rem; font-weight:600; color:var(--muted);
            margin-bottom:7px; text-transform:uppercase; letter-spacing:0.6px;
        }
        .contenedor-input { position:relative; }
        .contenedor-input i {
            position:absolute; left:14px; top:50%; transform:translateY(-50%);
            color:var(--muted); font-size:0.9rem; transition:color 0.3s; pointer-events:none;
        }
        .contenedor-input textarea ~ i { top:18px; transform:none; }

        textarea, input[type="text"], input[type="url"], select {
            width:100%; background:var(--bg2); border:1.5px solid var(--border);
            border-radius:12px; padding:13px 14px 13px 42px; color:var(--fg);
            font-family:'JetBrains Mono',monospace; font-size:0.9rem;
            outline:none; transition:border-color 0.3s,box-shadow 0.3s; resize:vertical;
        }
        textarea:focus, input[type="text"]:focus, input[type="url"]:focus, select:focus {
            border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow);
        }
        textarea { min-height:110px; }
        select { padding-left:42px; cursor:pointer; appearance:none; -webkit-appearance:none; }

        .conteo-caracteres {
            text-align:right; font-size:0.72rem; color:var(--muted);
            margin-top:4px; font-family:'JetBrains Mono',monospace;
        }
        .conteo-caracteres.aviso { color:#ffab40; }
        .conteo-caracteres.peligro { color:var(--danger); }

        .fila-colores { display:flex; gap:14px; }
        .grupo-color { flex:1; }
        .grupo-color label {
            display:block; font-size:0.75rem; font-weight:600; color:var(--muted);
            margin-bottom:5px; text-transform:uppercase; letter-spacing:0.5px;
        }
        .selector-color {
            display:flex; align-items:center; gap:10px;
            background:var(--bg2); border:1.5px solid var(--border);
            border-radius:12px; padding:7px 12px; transition:border-color 0.3s;
        }
        .selector-color:hover { border-color:rgba(0,230,118,0.25); }
        input[type="color"] { width:34px; height:34px; border:none; border-radius:8px; cursor:pointer; background:none; padding:0; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding:0; }
        input[type="color"]::-webkit-color-swatch { border:2px solid var(--border); border-radius:8px; }
        .hex-color { font-family:'JetBrains Mono',monospace; font-size:0.82rem; color:var(--muted); }

        .fila-generar { display:flex; gap:12px; margin-top:4px; }
        .btn {
            display:inline-flex; align-items:center; justify-content:center;
            gap:8px; padding:15px 20px; border-radius:14px;
            font-family:'Space Grotesk',sans-serif; font-size:0.92rem; font-weight:700;
            cursor:pointer; border:none; transition:all 0.3s;
            text-transform:uppercase; letter-spacing:0.5px; flex:1;
        }
        .btn-normal {
            background:linear-gradient(135deg,var(--accent),var(--accent2));
            color:var(--bg); box-shadow:0 4px 24px var(--accent-glow);
        }
        .btn-normal:hover { transform:translateY(-2px); box-shadow:0 6px 35px rgba(0,230,118,0.32); }
        .btn-pirograbado {
            background:linear-gradient(135deg,var(--piro),var(--piro2));
            color:#fff; box-shadow:0 4px 24px var(--piro-glow);
        }
        .btn-pirograbado:hover { transform:translateY(-2px); box-shadow:0 6px 35px rgba(255,109,0,0.32); }
        .btn:active { transform:translateY(0) !important; }
        .btn:disabled { opacity:0.6; cursor:wait; transform:none !important; }

        .btn-secundario { background:var(--bg2); color:var(--fg); border:1px solid var(--border); flex:1; box-shadow:none; }
        .btn-secundario:hover { background:var(--card-hover); border-color:var(--accent); color:var(--accent); transform:translateY(-1px); }
        .btn-peligro { background:transparent; color:var(--danger); border:1px solid rgba(255,82,82,0.25); flex:none; }
        .btn-peligro:hover { background:rgba(255,82,82,0.08); border-color:var(--danger); }

        .fila-botones { display:flex; gap:10px; margin-top:10px; width:100%; }

        .badge-resolucion {
            display:inline-flex; align-items:center; gap:6px;
            background:rgba(0,230,118,0.08); color:var(--accent);
            border:1px solid rgba(0,230,118,0.18); border-radius:8px;
            padding:5px 12px; font-size:0.72rem; font-weight:600;
            font-family:'JetBrains Mono',monospace; letter-spacing:0.3px;
        }
        .badge-resolucion i { font-size:0.72rem; }

        .badge-modo-activo {
            display:inline-flex; align-items:center; gap:6px;
            border-radius:8px; padding:5px 12px;
            font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.4px;
        }
        .badge-modo-activo.normal { background:rgba(0,230,118,0.1); color:var(--accent); border:1px solid rgba(0,230,118,0.2); }
        .badge-modo-activo.piro { background:rgba(255,109,0,0.1); color:var(--piro); border:1px solid rgba(255,109,0,0.2); }

        .area-previa { display:flex; flex-direction:column; align-items:center; gap:16px; }
        .marco-qr {
            position:relative; background:#ffffff; border-radius:20px; padding:20px;
            display:flex; align-items:center; justify-content:center;
            min-width:180px; min-height:180px; max-width:100%;
            transition:transform 0.4s,box-shadow 0.4s;
            box-shadow:0 8px 40px rgba(0,0,0,0.3); overflow:hidden;
        }
        .marco-qr:hover { box-shadow:0 12px 50px rgba(0,0,0,0.4),0 0 40px var(--accent-glow); }
        .marco-qr .esquina { position:absolute; width:22px; height:22px; border-color:var(--accent); border-style:solid; border-width:0; transition:border-color 0.4s; }
        .marco-qr .esquina.si { top:-4px; left:-4px; border-top-width:3px; border-left-width:3px; border-radius:6px 0 0 0; }
        .marco-qr .esquina.sd { top:-4px; right:-4px; border-top-width:3px; border-right-width:3px; border-radius:0 6px 0 0; }
        .marco-qr .esquina.ii { bottom:-4px; left:-4px; border-bottom-width:3px; border-left-width:3px; border-radius:0 0 0 6px; }
        .marco-qr .esquina.id { bottom:-4px; right:-4px; border-bottom-width:3px; border-right-width:3px; border-radius:0 0 6px 0; }
        .marco-qr.modo-piro .esquina { border-color:var(--piro); }

        #salida-qr { display:flex; align-items:center; justify-content:center; overflow:auto; max-width:100%; }
        #salida-qr img, #salida-qr canvas { border-radius:4px; max-width:100%; height:auto; display:block; }

        .qr-vacio { text-align:center; padding:28px; }
        .qr-vacio i { font-size:3.8rem; color:var(--border); margin-bottom:14px; display:block; animation:vacioPulso 2.5s ease-in-out infinite; }
        @keyframes vacioPulso { 0%,100%{opacity:0.3;transform:scale(1)} 50%{opacity:0.55;transform:scale(1.05)} }
        .qr-vacio p { color:var(--muted); font-size:0.9rem; line-height:1.5; }

        .info-qr { font-size:0.75rem; color:var(--muted); font-family:'JetBrains Mono',monospace; text-align:center; line-height:1.6; }

        .contenedor-toast { position:fixed; top:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:10px; }
        .toast {
            background:var(--card); border:1px solid var(--border); border-radius:12px;
            padding:13px 18px; display:flex; align-items:center; gap:10px;
            font-size:0.88rem; min-width:250px; box-shadow:0 8px 30px rgba(0,0,0,0.4);
            animation:toastEntra 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        .toast.exito { border-left:3px solid var(--accent); }
        .toast.error { border-left:3px solid var(--danger); }
        .toast.info { border-left:3px solid var(--warning); }
        .toast.exito i { color:var(--accent); }
        .toast.error i { color:var(--danger); }
        .toast.info i { color:var(--warning); }
        .toast i { font-size:1.1rem; }
        @keyframes toastEntra { from{opacity:0;transform:translateX(60px)} to{opacity:1;transform:translateX(0)} }
        .toast-sale { animation:toastSale 0.3s ease-in forwards; }
        @keyframes toastSale { to{opacity:0;transform:translateX(60px)} }

        .seccion-historial { margin-top:32px; }
        .grilla-historial { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:12px; }
        .item-historial {
            background:var(--bg2); border:1px solid var(--border); border-radius:14px;
            padding:14px; text-align:center; cursor:pointer; transition:all 0.3s;
            animation:histEntra 0.4s ease-out;
        }
        @keyframes histEntra { from{opacity:0;transform:translateY(14px) scale(0.96)} to{opacity:1;transform:translateY(0) scale(1)} }
        .item-historial:hover { border-color:var(--accent); transform:translateY(-3px); box-shadow:0 6px 20px rgba(0,0,0,0.3); }
        .item-historial img { width:76px; height:76px; border-radius:6px; margin-bottom:8px; }
        .item-historial .texto-hist { font-size:0.72rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-family:'JetBrains Mono',monospace; }
        .item-historial .tipo-hist { font-size:0.63rem; color:var(--accent); text-transform:uppercase; letter-spacing:0.5px; margin-top:3px; }
        .historial-vacio { text-align:center; padding:28px; color:var(--muted); font-size:0.9rem; grid-column:1/-1; }
        .historial-vacio i { font-size:2rem; margin-bottom:10px; display:block; opacity:0.35; }

        .barra-estadisticas { display:flex; gap:14px; margin-bottom:24px; justify-content:center; flex-wrap:wrap; }
        .chip-stat {
            display:flex; align-items:center; gap:8px;
            background:var(--card); border:1px solid var(--border);
            border-radius:50px; padding:7px 16px; font-size:0.8rem; color:var(--muted);
        }
        .chip-stat i { color:var(--accent); font-size:0.82rem; }
        .chip-stat span { font-weight:700; color:var(--fg); font-family:'JetBrains Mono',monospace; }

        .separador { height:1px; background:var(--border); margin:16px 0; }

        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background:var(--bg); }
        ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
        .nav-teclado *:focus { outline:2px solid var(--accent) !important; outline-offset:2px !important; }
        @media(prefers-reduced-motion:reduce){
            *,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important;}
        }
    </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>
<div class="contenedor-toast" id="contenedorToast"></div>

<div class="contenedor">

    <header>
        <div class="logo-icono"><i class="fas fa-qrcode"></i></div>
        <h1>Generador de QR</h1>
        <p>Crea tus codigos QR funcionales al instante</p>
    </header>

    <div class="barra-estadisticas">
        <div class="chip-stat"><i class="fas fa-layer-group"></i> Generados: <span id="statTotal">0</span></div>
        <div class="chip-stat"><i class="fas fa-bolt"></i> Tiempo real</div>
        <div class="chip-stat"><i class="fas fa-lock"></i> 1476 x 1476 px</div>
    </div>

    <div class="grilla-principal">

        <div class="tarjeta">
            <div class="tarjeta-titulo"><i class="fas fa-sliders-h"></i> Configuracion</div>

            <div class="pestannas-tipo" id="pestannasTipo" role="tablist">
                <button class="pestanna activa" data-tipo="texto" role="tab" aria-selected="true"><i class="fas fa-font"></i>Texto</button>
                <button class="pestanna" data-tipo="url" role="tab" aria-selected="false"><i class="fas fa-link"></i>Enlace</button>
                <button class="pestanna" data-tipo="wifi" role="tab" aria-selected="false"><i class="fas fa-wifi"></i>WiFi</button>
                <button class="pestanna" data-tipo="correo" role="tab" aria-selected="false"><i class="fas fa-envelope"></i>Correo</button>
                <button class="pestanna" data-tipo="telefono" role="tab" aria-selected="false"><i class="fas fa-phone"></i>Telefono</button>
            </div>

            <div class="panel-entrada activa" id="panel-texto">
                <div class="grupo-form">
                    <label for="entrada-texto">Texto o mensaje</label>
                    <div class="contenedor-input">
                        <textarea id="entrada-texto" placeholder="Escribe cualquier texto aqui..." maxlength="900" aria-label="Texto para el QR"></textarea>
                        <i class="fas fa-pen" style="top:16px;transform:none;"></i>
                    </div>
                    <div class="conteo-caracteres" id="conteoTexto">0 / 900</div>
                </div>
            </div>

            <div class="panel-entrada" id="panel-url">
                <div class="grupo-form">
                    <label for="entrada-url">Direccion web</label>
                    <div class="contenedor-input">
                        <input type="url" id="entrada-url" placeholder="https://ejemplo.com" aria-label="URL">
                        <i class="fas fa-globe"></i>
                    </div>
                </div>
            </div>

            <div class="panel-entrada" id="panel-wifi">
                <div class="grupo-form">
                    <label for="entrada-wifi-nombre">Nombre de red (SSID)</label>
                    <div class="contenedor-input">
                        <input type="text" id="entrada-wifi-nombre" placeholder="MiRedWiFi" aria-label="SSID">
                        <i class="fas fa-wifi"></i>
                    </div>
                </div>
                <div class="grupo-form">
                    <label for="entrada-wifi-clave">Contrasena</label>
                    <div class="contenedor-input">
                        <input type="text" id="entrada-wifi-clave" placeholder="contrasena123" aria-label="Clave WiFi">
                        <i class="fas fa-key"></i>
                    </div>
                </div>
                <div class="grupo-form">
                    <label for="entrada-wifi-cifrado">Tipo de cifrado</label>
                    <div class="contenedor-input">
                        <select id="entrada-wifi-cifrado" aria-label="Cifrado">
                            <option value="WPA">WPA / WPA2</option>
                            <option value="WEP">WEP</option>
                            <option value="nopass">Sin cifrado</option>
                        </select>
                        <i class="fas fa-shield-halved"></i>
                    </div>
                </div>
            </div>

            <div class="panel-entrada" id="panel-correo">
                <div class="grupo-form">
                    <label for="entrada-correo-direccion">Correo electronico</label>
                    <div class="contenedor-input">
                        <input type="text" id="entrada-correo-direccion" placeholder="correo@ejemplo.com" aria-label="Correo">
                        <i class="fas fa-at"></i>
                    </div>
                </div>
                <div class="grupo-form">
                    <label for="entrada-correo-asunto">Asunto</label>
                    <div class="contenedor-input">
                        <input type="text" id="entrada-correo-asunto" placeholder="Asunto del correo" aria-label="Asunto">
                        <i class="fas fa-tag"></i>
                    </div>
                </div>
                <div class="grupo-form">
                    <label for="entrada-correo-cuerpo">Mensaje</label>
                    <div class="contenedor-input">
                        <textarea id="entrada-correo-cuerpo" placeholder="Cuerpo del mensaje..." aria-label="Cuerpo" style="min-height:80px"></textarea>
                        <i class="fas fa-message" style="top:16px;transform:none;"></i>
                    </div>
                </div>
            </div>

            <div class="panel-entrada" id="panel-telefono">
                <div class="grupo-form">
                    <label for="entrada-telefono">Numero de telefono</label>
                    <div class="contenedor-input">
                        <input type="text" id="entrada-telefono" placeholder="+52 55 1234 5678" aria-label="Telefono">
                        <i class="fas fa-phone"></i>
                    </div>
                </div>
            </div>

            <div class="separador"></div>

            <div class="grupo-form">
                <label>Colores del QR</label>
                <div class="fila-colores">
                    <div class="grupo-color">
                        <label for="color-frente">Frontal</label>
                        <div class="selector-color">
                            <input type="color" id="color-frente" value="#000000" aria-label="Color frontal">
                            <span class="hex-color" id="hexFrente">#000000</span>
                        </div>
                    </div>
                    <div class="grupo-color">
                        <label for="color-fondo">Fondo</label>
                        <div class="selector-color">
                            <input type="color" id="color-fondo" value="#ffffff" aria-label="Color de fondo">
                            <span class="hex-color" id="hexFondo">#FFFFFF</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="separador"></div>

            <div class="fila-generar">
                <button class="btn btn-normal" id="btnNormal" aria-label="Generar QR Normal">
                    <i class="fas fa-qrcode"></i> QR Normal
                </button>
                <button class="btn btn-pirograbado" id="btnPirograbado" aria-label="Generar QR Pirograbado">
                    <i class="fas fa-fire"></i> QR Pirograbado
                </button>
            </div>
        </div>

        <div class="tarjeta">
            <div class="tarjeta-titulo"><i class="fas fa-eye"></i> Vista previa</div>
            <div class="area-previa">
                <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
                    <span class="badge-resolucion"><i class="fas fa-lock"></i> 1476 x 1476 px fijo</span>
                    <span class="badge-modo-activo" id="badgeModo" style="display:none;"></span>
                </div>
                <div class="marco-qr" id="marcoQR">
                    <span class="esquina si"></span>
                    <span class="esquina sd"></span>
                    <span class="esquina ii"></span>
                    <span class="esquina id"></span>
                    <div id="salida-qr">
                        <div class="qr-vacio" id="qrVacio">
                            <i class="fas fa-qrcode"></i>
                            <p>Ingresa contenido y elige un modo de generacion</p>
                        </div>
                    </div>
                </div>
                <div class="info-qr" id="infoQR"></div>
                <div class="fila-botones" id="botonesAccion" style="display:none;">
                    <button class="btn btn-secundario" id="btnDescargar" aria-label="Descargar QR"><i class="fas fa-download"></i> Descargar PNG</button>
                    <button class="btn btn-secundario" id="btnCopiar" aria-label="Copiar QR"><i class="fas fa-copy"></i> Copiar</button>
                </div>
            </div>
        </div>
    </div>

    <section class="seccion-historial">
        <div class="tarjeta">
            <div class="tarjeta-titulo" style="justify-content:space-between;">
                <span><i class="fas fa-clock-rotate-left"></i> Historial reciente</span>
                <button class="btn btn-peligro" id="btnLimpiarHistorial" style="padding:6px 14px;font-size:0.72rem;display:none;"><i class="fas fa-trash"></i> Limpiar</button>
            </div>
            <div class="grilla-historial" id="grillaHistorial">
                <div class="historial-vacio"><i class="fas fa-inbox"></i>Tus codigos QR generados apareceran aqui</div>
            </div>
        </div>
    </section>
</div>

<script>
    // ===== Constante de resolucion fija =====
    var RESOLUCION = 1476;

    // ===== Estado global =====
    var tipoActual = 'texto';
    var ultimoModo = 'normal';
    var generando = false;
    var totalGenerados = parseInt(localStorage.getItem('qr_total') || '0');
    var historial = JSON.parse(localStorage.getItem('qr_historial') || '[]');

    // ===== Referencias DOM =====
    var pestannas = document.querySelectorAll('.pestanna');
    var paneles = document.querySelectorAll('.panel-entrada');
    var salidaQR = document.getElementById('salida-qr');
    var marcoQR = document.getElementById('marcoQR');
    var botonesAccion = document.getElementById('botonesAccion');
    var btnDescargar = document.getElementById('btnDescargar');
    var btnCopiar = document.getElementById('btnCopiar');
    var colorFrente = document.getElementById('color-frente');
    var colorFondo = document.getElementById('color-fondo');
    var hexFrente = document.getElementById('hexFrente');
    var hexFondo = document.getElementById('hexFondo');
    var statTotal = document.getElementById('statTotal');
    var grillaHistorial = document.getElementById('grillaHistorial');
    var btnLimpiarHistorial = document.getElementById('btnLimpiarHistorial');
    var conteoTexto = document.getElementById('conteoTexto');
    var entradaTexto = document.getElementById('entrada-texto');
    var contenedorToast = document.getElementById('contenedorToast');
    var infoQR = document.getElementById('infoQR');
    var badgeModo = document.getElementById('badgeModo');
    var btnNormal = document.getElementById('btnNormal');
    var btnPirograbado = document.getElementById('btnPirograbado');

    statTotal.textContent = totalGenerados;

    // ===== Particulas =====
    (function() {
        var estilo = document.createElement('style');
        estilo.textContent = '@keyframes pFlotar{0%,100%{opacity:0;transform:translateY(0) translateX(0)}20%{opacity:0.4}50%{opacity:0.15;transform:translateY(-70px) translateX(25px)}80%{opacity:0.35}}';
        document.head.appendChild(estilo);
        for (var i = 0; i < 14; i++) {
            var p = document.createElement('div');
            p.className = 'particula';
            p.style.left = Math.random()*100+'vw';
            p.style.top = Math.random()*100+'vh';
            var t = (2+Math.random()*3)+'px';
            p.style.width = t; p.style.height = t;
            p.style.animation = 'pFlotar '+(9+Math.random()*14)+'s ease-in-out infinite';
            p.style.animationDelay = (-Math.random()*12)+'s';
            document.body.appendChild(p);
        }
    })();

    // ===== Toast =====
    function mostrarToast(mensaje, tipo) {
        tipo = tipo || 'exito';
        var iconos = { exito:'fa-check-circle', error:'fa-exclamation-circle', info:'fa-info-circle' };
        var toast = document.createElement('div');
        toast.className = 'toast ' + tipo;
        toast.innerHTML = '<i class="fas '+iconos[tipo]+'"></i><span>'+mensaje+'</span>';
        contenedorToast.appendChild(toast);
        setTimeout(function(){ toast.classList.add('toast-sale'); setTimeout(function(){ toast.remove(); }, 300); }, 3500);
    }

    // ===== Pestañas =====
    pestannas.forEach(function(pestanna) {
        pestanna.addEventListener('click', function() {
            pestannas.forEach(function(p) { p.classList.remove('activa'); p.setAttribute('aria-selected','false'); });
            pestanna.classList.add('activa');
            pestanna.setAttribute('aria-selected','true');
            tipoActual = pestanna.getAttribute('data-tipo');
            paneles.forEach(function(p) { p.classList.remove('activa'); });
            var panel = document.getElementById('panel-' + tipoActual);
            if (panel) panel.classList.add('activa');
        });
    });

    // ===== Colores =====
    colorFrente.addEventListener('input', function() { hexFrente.textContent = colorFrente.value.toUpperCase(); });
    colorFondo.addEventListener('input', function() { hexFondo.textContent = colorFondo.value.toUpperCase(); });

    // ===== Conteo de caracteres =====
    entradaTexto.addEventListener('input', function() {
        var len = entradaTexto.value.length;
        conteoTexto.textContent = len + ' / 900';
        conteoTexto.className = 'conteo-caracteres' + (len > 800 ? ' peligro' : len > 600 ? ' aviso' : '');
    });

    // ===== Obtener datos segun tipo =====
    function obtenerDatosQR() {
        switch (tipoActual) {
            case 'texto': return entradaTexto.value.trim();
            case 'url': return document.getElementById('entrada-url').value.trim();
            case 'wifi': {
                var ssid = document.getElementById('entrada-wifi-nombre').value.trim();
                var clave = document.getElementById('entrada-wifi-clave').value.trim();
                var cifrado = document.getElementById('entrada-wifi-cifrado').value;
                if (!ssid) return '';
                return 'WIFI:T:'+cifrado+';S:'+ssid+';P:'+clave+';;';
            }
            case 'correo': {
                var dir = document.getElementById('entrada-correo-direccion').value.trim();
                var asunto = document.getElementById('entrada-correo-asunto').value.trim();
                var cuerpo = document.getElementById('entrada-correo-cuerpo').value.trim();
                if (!dir) return '';
                var mailto = 'mailto:'+dir;
                var params = [];
                if (asunto) params.push('subject='+encodeURIComponent(asunto));
                if (cuerpo) params.push('body='+encodeURIComponent(cuerpo));
                if (params.length) mailto += '?'+params.join('&');
                return mailto;
            }
            case 'telefono': {
                var tel = document.getElementById('entrada-telefono').value.trim();
                if (!tel) return '';
                return 'tel:'+tel;
            }
            default: return '';
        }
    }

    function etiquetaTipo(tipo) {
        var e = { texto:'Texto', url:'Enlace', wifi:'WiFi', correo:'Correo', telefono:'Telefono' };
        return e[tipo] || tipo;
    }

    // ===== Generar QR NORMAL (1476x1476, nivel H, colores del usuario) =====
    function generarQRNormal(datos) {
        var tempDiv = document.createElement('div');
        tempDiv.style.position = 'absolute';
        tempDiv.style.left = '-9999px';
        document.body.appendChild(tempDiv);

        var tempQR = new QRCode(tempDiv, {
            text: datos,
            width: 100,
            height: 100,
            correctLevel: QRCode.CorrectLevel.H
        });

        var qrModel = tempQR._oQRCode;
        var moduleCount = qrModel.moduleCount;
        var moduleSize = Math.floor(RESOLUCION / moduleCount);
        var totalQR = moduleSize * moduleCount;
        var offset = Math.floor((RESOLUCION - totalQR) / 2);

        var canvas = document.createElement('canvas');
        canvas.width = RESOLUCION;
        canvas.height = RESOLUCION;
        var ctx = canvas.getContext('2d');

        ctx.fillStyle = colorFondo.value;
        ctx.fillRect(0, 0, RESOLUCION, RESOLUCION);

        ctx.fillStyle = colorFrente.value;
        for (var row = 0; row < moduleCount; row++) {
            for (var col = 0; col < moduleCount; col++) {
                if (qrModel.isDark(row, col)) {
                    ctx.fillRect(
                        offset + col * moduleSize,
                        offset + row * moduleSize,
                        moduleSize,
                        moduleSize
                    );
                }
            }
        }

        salidaQR.appendChild(canvas);

        infoQR.innerHTML = 'Modo: <strong>Normal</strong> | Correccion: H (30%) | Modulos: ' + moduleCount + 'x' + moduleCount + ' | Pixel por modulo: ' + moduleSize + 'px';

        setTimeout(function() { document.body.removeChild(tempDiv); }, 100);
    }

    // ===== Acortador de URL =====
    async function acortarURL(urlLarga) {
        // Intentar con is.gd
        try {
            var resp = await fetch('https://is.gd/create.php?format=simple&url=' + encodeURIComponent(urlLarga));
            if (resp.ok) {
                var corta = await resp.text();
                if (corta && corta.startsWith('http')) return corta;
            }
        } catch(e) {}

        // Intentar con TinyURL
        try {
            var resp2 = await fetch('https://tinyurl.com/api-create.php?url=' + encodeURIComponent(urlLarga));
            if (resp2.ok) {
                var corta2 = await resp2.text();
                if (corta2 && corta2.startsWith('http')) return corta2;
            }
        } catch(e) {}

        return null;
    }

    // ===== Renderizar canvas pirograbado desde generador qrcode =====
    function renderPirograbadoCanvas(qrGen, fueAcortado, infoVersion) {
        var moduleCount = qrGen.getModuleCount();
        var moduleSize = Math.floor(RESOLUCION / moduleCount);
        var totalQR = moduleSize * moduleCount;
        var offset = Math.floor((RESOLUCION - totalQR) / 2);

        var canvas = document.createElement('canvas');
        canvas.width = RESOLUCION;
        canvas.height = RESOLUCION;
        var ctx = canvas.getContext('2d');

        // Blanco puro
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, RESOLUCION, RESOLUCION);

        // Negro puro
        ctx.fillStyle = '#000000';
        for (var row = 0; row < moduleCount; row++) {
            for (var col = 0; col < moduleCount; col++) {
                if (qrGen.isDark(row, col)) {
                    ctx.fillRect(
                        offset + col * moduleSize,
                        offset + row * moduleSize,
                        moduleSize,
                        moduleSize
                    );
                }
            }
        }

        salidaQR.appendChild(canvas);

        var infoExtra = fueAcortado ? ' | Link acortado' : '';
        infoQR.innerHTML = 'Modo: <strong>Pirograbado</strong> | ' + infoVersion + ' | Pixel por modulo: <strong>' + moduleSize + 'px</strong> | Blanco y negro puro' + infoExtra;
    }

    // ===== Generar QR PIROGRABADO (Version 1 forzada, 21x21, nivel L) =====
    async function generarQRPirograbado(datos) {
        var datosParaQR = datos;
        var fueAcortado = false;
        var qrGen = null;

        // ===================================================
        // PASO 1: Intentar Version 1 forzada (21x21) + nivel L
        // ===================================================
        try {
            qrGen = qrcode(1, 'L');
            qrGen.addData(datosParaQR);
            qrGen.make();
            renderPirograbadoCanvas(qrGen, false, 'Version 1 forzada (21x21)');
            return;
        } catch(e) {
            // No cabe en Version 1, continuar al paso 2
        }

        // ===================================================
        // PASO 2: Si es un enlace, acortar automaticamente
        // ===================================================
        if (tipoActual === 'url' || datosParaQR.match(/^https?:\/\//i)) {
            mostrarToast('Link muy largo para pixeles maximos, acortando...', 'info');

            var urlCorta = await acortarURL(datosParaQR);

            if (urlCorta) {
                fueAcortado = true;
                datosParaQR = urlCorta;

                // Reintentar Version 1 con link acortado
                try {
                    qrGen = qrcode(1, 'L');
                    qrGen.addData(datosParaQR);
                    qrGen.make();
                    renderPirograbadoCanvas(qrGen, true, 'Version 1 forzada (21x21) | Link acortado');
                    mostrarToast('Link acortado y QR generado con pixeles maximos', 'exito');
                    return;
                } catch(e2) {
                    // Aun con link corto no cabe en Version 1
                }
            } else {
                mostrarToast('No se pudo acortar el link, usando version optimizada', 'info');
            }
        }

        // ===================================================
        // PASO 3: Fallback — version auto con nivel L
        // (la menor cantidad de modulos posible = pixeles grandes)
        // ===================================================
        try {
            qrGen = qrcode(0, 'L');
            qrGen.addData(datosParaQR);
            qrGen.make();
            var mc = qrGen.getModuleCount();
            renderPirograbadoCanvas(qrGen, fueAcortado, 'Version auto (' + mc + 'x' + mc + ') | Nivel L');
            mostrarToast('QR generado con pixeles mas grandes posibles', 'exito');
        } catch(e3) {
            throw e3;
        }
    }

    // ===== Funcion principal de generacion =====
    async function generarQR(modo) {
        if (generando) return;
        var datos = obtenerDatosQR();
        if (!datos) {
            mostrarToast('Escribe algo antes de generar', 'error');
            return;
        }

        generando = true;
        btnNormal.disabled = true;
        btnPirograbado.disabled = true;
        salidaQR.innerHTML = '';
        ultimoModo = modo;

        try {
            if (modo === 'normal') {
                generarQRNormal(datos);
                marcoQR.style.background = colorFondo.value;
                marcoQR.classList.remove('modo-piro');

                badgeModo.style.display = 'inline-flex';
                badgeModo.className = 'badge-modo-activo normal';
                badgeModo.innerHTML = '<i class="fas fa-qrcode"></i> Normal';
            } else {
                await generarQRPirograbado(datos);
                marcoQR.style.background = '#ffffff';
                marcoQR.classList.add('modo-piro');

                badgeModo.style.display = 'inline-flex';
                badgeModo.className = 'badge-modo-activo piro';
                badgeModo.innerHTML = '<i class="fas fa-fire"></i> Pirograbado';
            }

            botonesAccion.style.display = 'flex';

            totalGenerados++;
            statTotal.textContent = totalGenerados;
            localStorage.setItem('qr_total', totalGenerados.toString());

            agregarAlHistorial(datos, modo);

            var nombreModo = modo === 'normal' ? 'Normal' : 'Pirograbado';
            mostrarToast('QR ' + nombreModo + ' generado (1476x1476)', 'exito');

            marcoQR.style.transform = 'scale(0.94)';
            setTimeout(function() { marcoQR.style.transform = 'scale(1)'; }, 220);

        } catch (e) {
            mostrarToast('Error al generar. Intenta con menos texto.', 'error');
            console.error(e);
        } finally {
            generando = false;
            btnNormal.disabled = false;
            btnPirograbado.disabled = false;
        }
    }

    // ===== Eventos de botones =====
    btnNormal.addEventListener('click', function() { generarQR('normal'); });
    btnPirograbado.addEventListener('click', function() { generarQR('pirograbado'); });

    document.querySelectorAll('input[type="text"],input[type="url"]').forEach(function(inp) {
        inp.addEventListener('keydown', function(e) { if (e.key==='Enter') generarQR('normal'); });
    });

    // ===== Descargar QR =====
    btnDescargar.addEventListener('click', function() {
        var canvas = salidaQR.querySelector('canvas');
        if (!canvas) { mostrarToast('No hay QR para descargar', 'error'); return; }

        var link = document.createElement('a');
        var sufijo = ultimoModo === 'pirograbado' ? 'pirograbado' : 'normal';
        link.download = 'qr-' + tipoActual + '-' + sufijo + '-1476x1476.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        mostrarToast('QR descargado como PNG (1476x1476)', 'exito');
    });

    // ===== Copiar QR =====
    btnCopiar.addEventListener('click', async function() {
        var canvas = salidaQR.querySelector('canvas');
        if (!canvas) { mostrarToast('No hay QR para copiar', 'error'); return; }

        try {
            var blob = await new Promise(function(resolve) { canvas.toBlob(resolve, 'image/png'); });
            await navigator.clipboard.write([ new ClipboardItem({ 'image/png': blob }) ]);
            mostrarToast('QR copiado al portapapeles', 'exito');
        } catch (e) {
            mostrarToast('No se pudo copiar. Intenta descargar.', 'info');
        }
    });

    // ===== Historial =====
    function agregarAlHistorial(datos, modo) {
        var tempDiv = document.createElement('div');
        tempDiv.style.position = 'absolute';
        tempDiv.style.left = '-9999px';
        document.body.appendChild(tempDiv);

        new QRCode(tempDiv, {
            text: datos, width: 80, height: 80,
            colorDark: '#000000', colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.M
        });

        setTimeout(function() {
            var canvas = tempDiv.querySelector('canvas');
            var imgSrc = canvas ? canvas.toDataURL('image/png') : '';

            historial.unshift({
                id: Date.now(),
                tipo: tipoActual,
                modo: modo,
                datos: datos,
                imgSrc: imgSrc,
                hora: new Date().toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' })
            });

            if (historial.length > 12) historial.pop();
            try { localStorage.setItem('qr_historial', JSON.stringify(historial)); } catch(e) {}
            document.body.removeChild(tempDiv);
            renderizarHistorial();
        }, 200);
    }

    function renderizarHistorial() {
        if (historial.length === 0) {
            grillaHistorial.innerHTML = '<div class="historial-vacio"><i class="fas fa-inbox"></i>Tus codigos QR generados apareceran aqui</div>';
            btnLimpiarHistorial.style.display = 'none';
            return;
        }

        btnLimpiarHistorial.style.display = 'inline-flex';
        var html = '';
        for (var i = 0; i < historial.length; i++) {
            var entry = historial[i];
            var etiquetaModo = entry.modo === 'pirograbado' ? 'Pirograbado' : 'Normal';
            html += '<div class="item-historial" data-indice="'+i+'" tabindex="0" role="button" aria-label="Restaurar QR">';
            html += '<img src="'+entry.imgSrc+'" alt="QR">';
            html += '<div class="texto-hist" title="'+entry.datos.replace(/"/g,'&quot;')+'">'+entry.datos+'</div>';
            html += '<div class="tipo-hist">'+etiquetaTipo(entry.tipo)+' &middot; '+etiquetaModo+' &middot; '+entry.hora+'</div>';
            html += '</div>';
        }
        grillaHistorial.innerHTML = html;

        grillaHistorial.querySelectorAll('.item-historial').forEach(function(item) {
            function restaurar() {
                var idx = parseInt(item.getAttribute('data-indice'));
                var entry = historial[idx];
                if (!entry) return;

                tipoActual = entry.tipo;
                pestannas.forEach(function(p) {
                    p.classList.remove('activa'); p.setAttribute('aria-selected','false');
                    if (p.getAttribute('data-tipo') === tipoActual) {
                        p.classList.add('activa'); p.setAttribute('aria-selected','true');
                    }
                });
                paneles.forEach(function(p) { p.classList.remove('activa'); });
                var panel = document.getElementById('panel-' + tipoActual);
                if (panel) panel.classList.add('activa');

                switch (tipoActual) {
                    case 'texto':
                        entradaTexto.value = entry.datos;
                        entradaTexto.dispatchEvent(new Event('input'));
                        break;
                    case 'url':
                        document.getElementById('entrada-url').value = entry.datos;
                        break;
                    case 'wifi':
                        var sm = entry.datos.match(/S:([^;]*)/);
                        var pm = entry.datos.match(/P:([^;]*)/);
                        var em = entry.datos.match(/T:([^;]*)/);
                        if (sm) document.getElementById('entrada-wifi-nombre').value = sm[1];
                        if (pm) document.getElementById('entrada-wifi-clave').value = pm[1];
                        if (em) document.getElementById('entrada-wifi-cifrado').value = em[1];
                        break;
                    case 'correo':
                        var cd = entry.datos.replace('mailto:','');
                        var cp = cd.split('?');
                        document.getElementById('entrada-correo-direccion').value = cp[0];
                        if (cp[1]) {
                            var params = new URLSearchParams(cp[1]);
                            document.getElementById('entrada-correo-asunto').value = params.get('subject') || '';
                            document.getElementById('entrada-correo-cuerpo').value = params.get('body') || '';
                        }
                        break;
                    case 'telefono':
                        document.getElementById('entrada-telefono').value = entry.datos.replace('tel:','');
                        break;
                }

                generarQR(entry.modo || 'normal');
                mostrarToast('QR restaurado del historial', 'info');
            }
            item.addEventListener('click', restaurar);
            item.addEventListener('keydown', function(e) { if (e.key==='Enter'||e.key===' '){e.preventDefault();restaurar();} });
        });
    }

    renderizarHistorial();

    btnLimpiarHistorial.addEventListener('click', function() {
        historial = [];
        localStorage.removeItem('qr_historial');
        renderizarHistorial();
        mostrarToast('Historial limpiado', 'info');
    });

    // ===== Ctrl+Enter =====
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); generarQR('normal'); }
    });

    // ===== Auto-generar con debounce =====
    var autoGenTimeout = null;
    function configurarAutoGen(el) {
        if (!el) return;
        el.addEventListener('input', function() {
            clearTimeout(autoGenTimeout);
            autoGenTimeout = setTimeout(function() {
                var datos = obtenerDatosQR();
                if (datos && datos.length > 2) generarQR(ultimoModo);
            }, 900);
        });
    }
    configurarAutoGen(entradaTexto);
    configurarAutoGen(document.getElementById('entrada-url'));
    configurarAutoGen(document.getElementById('entrada-wifi-nombre'));
    configurarAutoGen(document.getElementById('entrada-wifi-clave'));
    configurarAutoGen(document.getElementById('entrada-correo-direccion'));
    configurarAutoGen(document.getElementById('entrada-telefono'));

    // ===== Efecto 3D en marco QR =====
    marcoQR.addEventListener('mousemove', function(e) {
        var rect = marcoQR.getBoundingClientRect();
        var x = ((e.clientX - rect.left) / rect.width - 0.5) * 10;
        var y = ((e.clientY - rect.top) / rect.height - 0.5) * 10;
        marcoQR.style.transform = 'perspective(600px) rotateY('+x+'deg) rotateX('+(-y)+'deg)';
    });
    marcoQR.addEventListener('mouseleave', function() {
        marcoQR.style.transform = 'perspective(600px) rotateY(0deg) rotateX(0deg)';
    });

    // ===== Focus visible =====
    document.addEventListener('keydown', function(e) { if (e.key==='Tab') document.body.classList.add('nav-teclado'); });
    document.addEventListener('mousedown', function() { document.body.classList.remove('nav-teclado'); });
</script>
</body>
