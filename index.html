<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de QR</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #080c0a;
            --bg2: #0e1512;
            --card: #121e18;
            --card-hover: #183025;
            --border: #1b3328;
            --fg: #e6f5ec;
            --muted: #6fa088;
            --accent: #00e676;
            --accent2: #00c853;
            --accent-glow: rgba(0,230,118,0.22);
            --danger: #ff5252;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== FONDOS ===== */
        .bg-grid {
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(0,230,118,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,230,118,0.025) 1px, transparent 1px);
            background-size: 44px 44px;
            animation: gridMove 25s linear infinite;
        }
        @keyframes gridMove {
            0% { transform: translate(0,0); }
            100% { transform: translate(44px,44px); }
        }

        .bg-blob {
            position: fixed; border-radius: 50%; filter: blur(130px);
            z-index: 0; pointer-events: none;
        }
        .bg-blob-1 { width:520px; height:520px; background:rgba(0,230,118,0.06); top:-160px; right:-120px; animation:bFloat1 14s ease-in-out infinite; }
        .bg-blob-2 { width:400px; height:400px; background:rgba(0,200,83,0.04); bottom:-100px; left:-80px; animation:bFloat2 18s ease-in-out infinite; }
        @keyframes bFloat1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-40px,50px) scale(1.12)} }
        @keyframes bFloat2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(50px,-40px) scale(1.1)} }

        .particula {
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
            background: var(--accent); opacity: 0;
        }

        /* ===== CONTENEDOR ===== */
        .contenedor {
            position: relative; z-index: 1;
            max-width: 1100px; margin: 0 auto;
            padding: 20px 18px 60px;
        }

        /* ===== ENCABEZADO ===== */
        header { text-align: center; padding: 36px 0 24px; }

        .logo-icono {
            display: inline-flex; align-items: center; justify-content: center;
            width: 68px; height: 68px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 18px; margin-bottom: 14px;
            font-size: 30px; color: var(--bg);
            box-shadow: 0 0 50px var(--accent-glow);
            animation: logoPulso 3s ease-in-out infinite;
        }
        @keyframes logoPulso {
            0%,100% { box-shadow: 0 0 40px var(--accent-glow); }
            50% { box-shadow: 0 0 70px var(--accent-glow), 0 0 100px rgba(0,230,118,0.08); }
        }

        header h1 {
            font-size: clamp(2.2rem,5vw,3.2rem); font-weight: 900;
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, var(--fg) 30%, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; line-height: 1.1;
        }

        header p {
            color: var(--muted); font-size: 1.05rem;
            margin-top: 8px; font-weight: 300;
        }

        /* ===== GRILLA PRINCIPAL ===== */
        .grilla-principal {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 24px; margin-top: 16px;
        }
        @media(max-width:820px) {
            .grilla-principal { grid-template-columns: 1fr; }
        }

        /* ===== TARJETAS ===== */
        .tarjeta {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 22px; padding: 26px;
            transition: border-color 0.3s;
        }
        .tarjeta:hover { border-color: rgba(0,230,118,0.18); }

        .tarjeta-titulo {
            font-size: 1.1rem; font-weight: 700;
            margin-bottom: 18px; display: flex;
            align-items: center; gap: 10px;
        }
        .tarjeta-titulo i { color: var(--accent); font-size: 1rem; }

        /* ===== PESTAÑAS DE TIPO ===== */
        .pestannas-tipo {
            display: flex; gap: 6px; margin-bottom: 20px;
            background: var(--bg2); border-radius: 14px; padding: 5px;
        }

        .pestanna {
            flex: 1; padding: 12px 6px; text-align: center;
            border-radius: 10px; cursor: pointer;
            font-size: 0.78rem; font-weight: 600;
            color: var(--muted); transition: all 0.3s;
            border: none; background: none;
            font-family: 'Space Grotesk', sans-serif;
            user-select: none;
        }
        .pestanna:hover { color: var(--fg); background: rgba(255,255,255,0.04); }
        .pestanna.activa {
            background: var(--accent); color: var(--bg);
            box-shadow: 0 2px 14px var(--accent-glow);
        }
        .pestanna i { display: block; font-size: 1.1rem; margin-bottom: 5px; }

        /* ===== PANELES ===== */
        .panel-entrada { display: none; }
        .panel-entrada.activa {
            display: block;
            animation: panelAparece 0.35s ease-out;
        }
        @keyframes panelAparece {
            from { opacity:0; transform:translateY(10px); }
            to { opacity:1; transform:translateY(0); }
        }

        /* ===== FORMULARIOS ===== */
        .grupo-form { margin-bottom: 16px; }

        .grupo-form label {
            display: block; font-size: 0.8rem; font-weight: 600;
            color: var(--muted); margin-bottom: 7px;
            text-transform: uppercase; letter-spacing: 0.6px;
        }

        .contenedor-input {
            position: relative;
        }
        .contenedor-input i {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%); color: var(--muted);
            font-size: 0.9rem; transition: color 0.3s;
            pointer-events: none;
        }
        .contenedor-input textarea ~ i { top: 18px; transform: none; }

        textarea, input[type="text"], input[type="url"], select {
            width: 100%; background: var(--bg2);
            border: 1.5px solid var(--border); border-radius: 12px;
            padding: 13px 14px 13px 42px; color: var(--fg);
            font-family: 'JetBrains Mono', monospace; font-size: 0.9rem;
            outline: none; transition: border-color 0.3s, box-shadow 0.3s;
            resize: vertical;
        }
        textarea:focus, input[type="text"]:focus, input[type="url"]:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        textarea { min-height: 110px; }

        select {
            padding-left: 42px; cursor: pointer;
            appearance: none; -webkit-appearance: none;
        }

        .conteo-caracteres {
            text-align: right; font-size: 0.72rem;
            color: var(--muted); margin-top: 4px;
            font-family: 'JetBrains Mono', monospace;
        }
        .conteo-caracteres.aviso { color: #ffab40; }
        .conteo-caracteres.peligro { color: var(--danger); }

        /* ===== COLORES ===== */
        .fila-colores { display: flex; gap: 14px; }

        .grupo-color { flex: 1; }
        .grupo-color label {
            display: block; font-size: 0.75rem; font-weight: 600;
            color: var(--muted); margin-bottom: 5px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        .selector-color {
            display: flex; align-items: center; gap: 10px;
            background: var(--bg2); border: 1.5px solid var(--border);
            border-radius: 12px; padding: 7px 12px;
            transition: border-color 0.3s;
        }
        .selector-color:hover { border-color: rgba(0,230,118,0.25); }

        input[type="color"] {
            width: 34px; height: 34px; border: none;
            border-radius: 8px; cursor: pointer;
            background: none; padding: 0;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid var(--border); border-radius: 8px;
        }

        .hex-color {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem; color: var(--muted);
        }

        /* ===== SLIDER TAMANO ===== */
        .slider-tamano {
            display: flex; align-items: center; gap: 12px;
        }
        input[type="range"] {
            flex: 1; -webkit-appearance: none; appearance: none;
            height: 6px; background: var(--bg2);
            border-radius: 3px; outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 22px; height: 22px;
            background: var(--accent); border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 12px var(--accent-glow); transition: transform 0.2s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        .valor-tamano {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem; color: var(--accent);
            min-width: 52px; text-align: right;
        }

        /* ===== BOTONES ===== */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 8px; padding: 14px 22px; border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.92rem; font-weight: 700; cursor: pointer;
            border: none; transition: all 0.3s;
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        .btn-principal {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: var(--bg); width: 100%;
            box-shadow: 0 4px 24px var(--accent-glow);
        }
        .btn-principal:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 35px rgba(0,230,118,0.32);
        }
        .btn-principal:active { transform: translateY(0); }

        .btn-secundario {
            background: var(--bg2); color: var(--fg);
            border: 1px solid var(--border); flex: 1;
        }
        .btn-secundario:hover {
            background: var(--card-hover); border-color: var(--accent);
            color: var(--accent);
        }

        .btn-peligro {
            background: transparent; color: var(--danger);
            border: 1px solid rgba(255,82,82,0.25);
        }
        .btn-peligro:hover {
            background: rgba(255,82,82,0.08); border-color: var(--danger);
        }

        .fila-botones { display: flex; gap: 10px; margin-top: 10px; width: 100%; }

        /* ===== VISTA PREVIA QR ===== */
        .area-previa {
            display: flex; flex-direction: column;
            align-items: center; gap: 20px;
        }

        .marco-qr {
            position: relative; background: #ffffff;
            border-radius: 20px; padding: 24px;
            display: flex; align-items: center; justify-content: center;
            min-width: 220px; min-height: 220px;
            transition: transform 0.4s, box-shadow 0.4s;
            box-shadow: 0 8px 40px rgba(0,0,0,0.3);
        }
        .marco-qr:hover {
            box-shadow: 0 12px 50px rgba(0,0,0,0.4), 0 0 40px var(--accent-glow);
        }

        .marco-qr .esquina {
            position: absolute; width: 22px; height: 22px;
            border-color: var(--accent); border-style: solid;
            border-width: 0;
        }
        .marco-qr .esquina.si { top:-4px; left:-4px; border-top-width:3px; border-left-width:3px; border-radius:6px 0 0 0; }
        .marco-qr .esquina.sd { top:-4px; right:-4px; border-top-width:3px; border-right-width:3px; border-radius:0 6px 0 0; }
        .marco-qr .esquina.ii { bottom:-4px; left:-4px; border-bottom-width:3px; border-left-width:3px; border-radius:0 0 0 6px; }
        .marco-qr .esquina.id { bottom:-4px; right:-4px; border-bottom-width:3px; border-right-width:3px; border-radius:0 0 6px 0; }

        #salida-qr { display:flex; align-items:center; justify-content:center; }
        #salida-qr img, #salida-qr canvas { border-radius: 4px; }

        .qr-vacio {
            text-align: center; padding: 28px;
        }
        .qr-vacio i {
            font-size: 3.8rem; color: var(--border);
            margin-bottom: 14px; display: block;
            animation: vacioPulso 2.5s ease-in-out infinite;
        }
        @keyframes vacioPulso {
            0%,100% { opacity:0.3; transform:scale(1); }
            50% { opacity:0.55; transform:scale(1.05); }
        }
        .qr-vacio p { color: var(--muted); font-size: 0.9rem; line-height: 1.5; }

        /* ===== TOAST ===== */
        .contenedor-toast {
            position: fixed; top: 20px; right: 20px;
            z-index: 9999; display: flex; flex-direction: column; gap: 10px;
        }
        .toast {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 13px 18px;
            display: flex; align-items: center; gap: 10px;
            font-size: 0.88rem; min-width: 250px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            animation: toastEntra 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        .toast.exito { border-left: 3px solid var(--accent); }
        .toast.error { border-left: 3px solid var(--danger); }
        .toast.info { border-left: 3px solid #ffab40; }
        .toast.exito i { color: var(--accent); }
        .toast.error i { color: var(--danger); }
        .toast.info i { color: #ffab40; }
        .toast i { font-size: 1.1rem; }

        @keyframes toastEntra { from{opacity:0;transform:translateX(60px)} to{opacity:1;transform:translateX(0)} }
        .toast-sale { animation: toastSale 0.3s ease-in forwards; }
        @keyframes toastSale { to{opacity:0;transform:translateX(60px)} }

        /* ===== HISTORIAL ===== */
        .seccion-historial { margin-top: 32px; }

        .grilla-historial {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
            gap: 12px;
        }

        .item-historial {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 14px; padding: 14px; text-align: center;
            cursor: pointer; transition: all 0.3s;
            animation: histEntra 0.4s ease-out;
        }
        @keyframes histEntra { from{opacity:0;transform:translateY(14px) scale(0.96)} to{opacity:1;transform:translateY(0) scale(1)} }

        .item-historial:hover {
            border-color: var(--accent); transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .item-historial img {
            width: 76px; height: 76px;
            border-radius: 6px; margin-bottom: 8px;
        }

        .item-historial .texto-hist {
            font-size: 0.72rem; color: var(--muted);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            font-family: 'JetBrains Mono', monospace;
        }

        .item-historial .tipo-hist {
            font-size: 0.63rem; color: var(--accent);
            text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px;
        }

        .historial-vacio {
            text-align: center; padding: 28px; color: var(--muted); font-size: 0.9rem;
        }
        .historial-vacio i { font-size: 2rem; margin-bottom: 10px; display: block; opacity: 0.35; }

        /* ===== CHIP ESTADISTICA ===== */
        .barra-estadisticas {
            display: flex; gap: 14px; margin-bottom: 24px;
            justify-content: center; flex-wrap: wrap;
        }
        .chip-stat {
            display: flex; align-items: center; gap: 8px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 50px; padding: 7px 16px;
            font-size: 0.8rem; color: var(--muted);
        }
        .chip-stat i { color: var(--accent); font-size: 0.82rem; }
        .chip-stat span { font-weight: 700; color: var(--fg); font-family: 'JetBrains Mono', monospace; }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* ===== FOCUS VISIBLE ===== */
        .nav-teclado *:focus {
            outline: 2px solid var(--accent) !important;
            outline-offset: 2px !important;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>

    <div class="contenedor-toast" id="contenedorToast"></div>

    <div class="contenedor">

        <!-- Encabezado -->
        <header>
            <div class="logo-icono"><i class="fas fa-qrcode"></i></div>
            <h1>Generador de QR</h1>
            <p>Crea codigos QR funcionales al instante, sin base de datos</p>
        </header>

        <!-- Estadisticas -->
        <div class="barra-estadisticas">
            <div class="chip-stat">
                <i class="fas fa-layer-group"></i>
                Generados: <span id="statTotal">0</span>
            </div>
            <div class="chip-stat">
                <i class="fas fa-bolt"></i>
                Tiempo real
            </div>
            <div class="chip-stat">
                <i class="fas fa-hard-drive"></i>
                Se guarda localmente
            </div>
        </div>

        <!-- Grilla principal -->
        <div class="grilla-principal">

            <!-- Panel izquierdo: Controles -->
            <div class="tarjeta">
                <div class="tarjeta-titulo">
                    <i class="fas fa-sliders-h"></i>
                    Configuracion
                </div>

                <!-- Pestañas de tipo -->
                <div class="pestannas-tipo" id="pestannasTipo" role="tablist">
                    <button class="pestanna activa" data-tipo="texto" role="tab" aria-selected="true" aria-label="Texto">
                        <i class="fas fa-font"></i>
                        Texto
                    </button>
                    <button class="pestanna" data-tipo="url" role="tab" aria-selected="false" aria-label="Enlace URL">
                        <i class="fas fa-link"></i>
                        Enlace
                    </button>
                    <button class="pestanna" data-tipo="wifi" role="tab" aria-selected="false" aria-label="WiFi">
                        <i class="fas fa-wifi"></i>
                        WiFi
                    </button>
                    <button class="pestanna" data-tipo="correo" role="tab" aria-selected="false" aria-label="Correo electronico">
                        <i class="fas fa-envelope"></i>
                        Correo
                    </button>
                    <button class="pestanna" data-tipo="telefono" role="tab" aria-selected="false" aria-label="Telefono">
                        <i class="fas fa-phone"></i>
                        Telefono
                    </button>
                </div>

                <!-- Panel: Texto -->
                <div class="panel-entrada activa" id="panel-texto">
                    <div class="grupo-form">
                        <label for="entrada-texto">Texto o mensaje</label>
                        <div class="contenedor-input">
                            <textarea id="entrada-texto" placeholder="Escribe cualquier texto aqui..." maxlength="900" aria-label="Texto para el QR"></textarea>
                            <i class="fas fa-pen" style="top:16px;transform:none;"></i>
                        </div>
                        <div class="conteo-caracteres" id="conteoTexto">0 / 900</div>
                    </div>
                </div>

                <!-- Panel: URL -->
                <div class="panel-entrada" id="panel-url">
                    <div class="grupo-form">
                        <label for="entrada-url">Direccion web</label>
                        <div class="contenedor-input">
                            <input type="url" id="entrada-url" placeholder="https://ejemplo.com" aria-label="URL para el QR">
                            <i class="fas fa-globe"></i>
                        </div>
                    </div>
                </div>

                <!-- Panel: WiFi -->
                <div class="panel-entrada" id="panel-wifi">
                    <div class="grupo-form">
                        <label for="entrada-wifi-nombre">Nombre de red (SSID)</label>
                        <div class="contenedor-input">
                            <input type="text" id="entrada-wifi-nombre" placeholder="MiRedWiFi" aria-label="Nombre de red WiFi">
                            <i class="fas fa-wifi"></i>
                        </div>
                    </div>
                    <div class="grupo-form">
                        <label for="entrada-wifi-clave">Contrasena</label>
                        <div class="contenedor-input">
                            <input type="text" id="entrada-wifi-clave" placeholder="contrasena123" aria-label="Clave WiFi">
                            <i class="fas fa-key"></i>
                        </div>
                    </div>
                    <div class="grupo-form">
                        <label for="entrada-wifi-cifrado">Tipo de cifrado</label>
                        <div class="contenedor-input">
                            <select id="entrada-wifi-cifrado" aria-label="Tipo de cifrado WiFi">
                                <option value="WPA">WPA / WPA2</option>
                                <option value="WEP">WEP</option>
                                <option value="nopass">Sin cifrado</option>
                            </select>
                            <i class="fas fa-shield-halved"></i>
                        </div>
                    </div>
                </div>

                <!-- Panel: Correo -->
                <div class="panel-entrada" id="panel-correo">
                    <div class="grupo-form">
                        <label for="entrada-correo-direccion">Correo electronico</label>
                        <div class="contenedor-input">
                            <input type="text" id="entrada-correo-direccion" placeholder="correo@ejemplo.com" aria-label="Correo electronico">
                            <i class="fas fa-at"></i>
                        </div>
                    </div>
                    <div class="grupo-form">
                        <label for="entrada-correo-asunto">Asunto</label>
                        <div class="contenedor-input">
                            <input type="text" id="entrada-correo-asunto" placeholder="Asunto del correo" aria-label="Asunto del correo">
                            <i class="fas fa-tag"></i>
                        </div>
                    </div>
                    <div class="grupo-form">
                        <label for="entrada-correo-cuerpo">Mensaje</label>
                        <div class="contenedor-input">
                            <textarea id="entrada-correo-cuerpo" placeholder="Cuerpo del mensaje..." aria-label="Cuerpo del correo" style="min-height:80px"></textarea>
                            <i class="fas fa-message" style="top:16px;transform:none;"></i>
                        </div>
                    </div>
                </div>

                <!-- Panel: Telefono -->
                <div class="panel-entrada" id="panel-telefono">
                    <div class="grupo-form">
                        <label for="entrada-telefono">Numero de telefono</label>
                        <div class="contenedor-input">
                            <input type="text" id="entrada-telefono" placeholder="+52 55 1234 5678" aria-label="Numero de telefono">
                            <i class="fas fa-phone"></i>
                        </div>
                    </div>
                </div>

                <!-- Personalizacion de colores -->
                <div style="margin-top:6px;">
                    <div class="grupo-form">
                        <label>Colores del QR</label>
                        <div class="fila-colores">
                            <div class="grupo-color">
                                <label for="color-frente">Frontal</label>
                                <div class="selector-color">
                                    <input type="color" id="color-frente" value="#000000" aria-label="Color frontal">
                                    <span class="hex-color" id="hexFrente">#000000</span>
                                </div>
                            </div>
                            <div class="grupo-color">
                                <label for="color-fondo">Fondo</label>
                                <div class="selector-color">
                                    <input type="color" id="color-fondo" value="#ffffff" aria-label="Color de fondo">
                                    <span class="hex-color" id="hexFondo">#FFFFFF</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="grupo-form">
                        <label for="slider-tamano">Tamano</label>
                        <div class="slider-tamano">
                            <input type="range" id="slider-tamano" min="128" max="512" value="256" step="16" aria-label="Tamano del QR">
                            <span class="valor-tamano" id="valorTamano">256px</span>
                        </div>
                    </div>
                </div>

                <!-- Boton generar -->
                <button class="btn btn-principal" id="btnGenerar" aria-label="Generar codigo QR">
                    <i class="fas fa-qrcode"></i>
                    Generar Codigo QR
                </button>
            </div>

            <!-- Panel derecho: Vista previa -->
            <div class="tarjeta">
                <div class="tarjeta-titulo">
                    <i class="fas fa-eye"></i>
                    Vista previa
                </div>

                <div class="area-previa">
                    <div class="marco-qr" id="marcoQR">
                        <span class="esquina si"></span>
                        <span class="esquina sd"></span>
                        <span class="esquina ii"></span>
                        <span class="esquina id"></span>
                        <div id="salida-qr">
                            <div class="qr-vacio" id="qrVacio">
                                <i class="fas fa-qrcode"></i>
                                <p>Ingresa contenido y genera tu codigo QR</p>
                            </div>
                        </div>
                    </div>

                    <div class="fila-botones" id="botonesAccion" style="display:none;">
                        <button class="btn btn-secundario" id="btnDescargar" aria-label="Descargar QR como PNG">
                            <i class="fas fa-download"></i>
                            Descargar
                        </button>
                        <button class="btn btn-secundario" id="btnCopiar" aria-label="Copiar QR al portapapeles">
                            <i class="fas fa-copy"></i>
                            Copiar
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Historial -->
        <section class="seccion-historial">
            <div class="tarjeta">
                <div class="tarjeta-titulo" style="justify-content:space-between;">
                    <span><i class="fas fa-clock-rotate-left"></i> Historial reciente</span>
                    <button class="btn btn-peligro" id="btnLimpiarHistorial" style="padding:6px 14px; font-size:0.72rem; display:none;">
                        <i class="fas fa-trash"></i> Limpiar
                    </button>
                </div>
                <div class="grilla-historial" id="grillaHistorial">
                    <div class="historial-vacio" id="historialVacio">
                        <i class="fas fa-inbox"></i>
                        Tus codigos QR generados apareceran aqui
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        // ===== Estado global =====
        let tipoActual = 'texto';
        let instanciaQR = null;
        let totalGenerados = parseInt(localStorage.getItem('qr_total') || '0');
        let historial = JSON.parse(localStorage.getItem('qr_historial') || '[]');

        // ===== Referencias DOM =====
        const pestannas = document.querySelectorAll('.pestanna');
        const paneles = document.querySelectorAll('.panel-entrada');
        const btnGenerar = document.getElementById('btnGenerar');
        const salidaQR = document.getElementById('salida-qr');
        const qrVacio = document.getElementById('qrVacio');
        const marcoQR = document.getElementById('marcoQR');
        const botonesAccion = document.getElementById('botonesAccion');
        const btnDescargar = document.getElementById('btnDescargar');
        const btnCopiar = document.getElementById('btnCopiar');
        const colorFrente = document.getElementById('color-frente');
        const colorFondo = document.getElementById('color-fondo');
        const hexFrente = document.getElementById('hexFrente');
        const hexFondo = document.getElementById('hexFondo');
        const sliderTamano = document.getElementById('slider-tamano');
        const valorTamano = document.getElementById('valorTamano');
        const statTotal = document.getElementById('statTotal');
        const grillaHistorial = document.getElementById('grillaHistorial');
        const btnLimpiarHistorial = document.getElementById('btnLimpiarHistorial');
        const conteoTexto = document.getElementById('conteoTexto');
        const entradaTexto = document.getElementById('entrada-texto');
        const contenedorToast = document.getElementById('contenedorToast');

        // Mostrar total guardado al cargar
        statTotal.textContent = totalGenerados;

        // ===== Particulas flotantes =====
        (function crearParticulas() {
            const estilo = document.createElement('style');
            estilo.textContent = `
                @keyframes pFlotar {
                    0%,100% { opacity:0; transform:translateY(0) translateX(0); }
                    20% { opacity:0.45; }
                    50% { opacity:0.2; transform:translateY(-70px) translateX(25px); }
                    80% { opacity:0.4; }
                }
            `;
            document.head.appendChild(estilo);

            for (let i = 0; i < 18; i++) {
                const p = document.createElement('div');
                p.className = 'particula';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = Math.random() * 100 + 'vh';
                const tam = (2 + Math.random() * 3) + 'px';
                p.style.width = tam;
                p.style.height = tam;
                p.style.animation = `pFlotar ${9 + Math.random() * 14}s ease-in-out infinite`;
                p.style.animationDelay = (-Math.random() * 12) + 's';
                document.body.appendChild(p);
            }
        })();

        // ===== Toast =====
        function mostrarToast(mensaje, tipo) {
            tipo = tipo || 'exito';
            const iconos = { exito: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle' };
            const toast = document.createElement('div');
            toast.className = 'toast ' + tipo;
            toast.innerHTML = '<i class="fas ' + iconos[tipo] + '"></i><span>' + mensaje + '</span>';
            contenedorToast.appendChild(toast);
            setTimeout(function() {
                toast.classList.add('toast-sale');
                setTimeout(function() { toast.remove(); }, 300);
            }, 3000);
        }

        // ===== Pestañas de tipo =====
        pestannas.forEach(function(pestanna) {
            pestanna.addEventListener('click', function() {
                // Desactivar todas
                pestannas.forEach(function(p) {
                    p.classList.remove('activa');
                    p.setAttribute('aria-selected', 'false');
                });
                // Activar la clicada
                pestanna.classList.add('activa');
                pestanna.setAttribute('aria-selected', 'true');
                tipoActual = pestanna.getAttribute('data-tipo');

                // Cambiar paneles
                paneles.forEach(function(p) { p.classList.remove('activa'); });
                var panel = document.getElementById('panel-' + tipoActual);
                if (panel) {
                    panel.classList.add('activa');
                }
            });
        });

        // ===== Colores =====
        colorFrente.addEventListener('input', function() {
            hexFrente.textContent = colorFrente.value.toUpperCase();
        });
        colorFondo.addEventListener('input', function() {
            hexFondo.textContent = colorFondo.value.toUpperCase();
        });

        // ===== Tamano =====
        sliderTamano.addEventListener('input', function() {
            valorTamano.textContent = sliderTamano.value + 'px';
        });

        // ===== Conteo de caracteres =====
        entradaTexto.addEventListener('input', function() {
            var len = entradaTexto.value.length;
            conteoTexto.textContent = len + ' / 900';
            conteoTexto.className = 'conteo-caracteres' + (len > 800 ? ' peligro' : len > 600 ? ' aviso' : '');
        });

        // ===== Obtener datos segun tipo =====
        function obtenerDatosQR() {
            switch (tipoActual) {
                case 'texto':
                    return entradaTexto.value.trim();
                case 'url':
                    return document.getElementById('entrada-url').value.trim();
                case 'wifi': {
                    var ssid = document.getElementById('entrada-wifi-nombre').value.trim();
                    var clave = document.getElementById('entrada-wifi-clave').value.trim();
                    var cifrado = document.getElementById('entrada-wifi-cifrado').value;
                    if (!ssid) return '';
                    return 'WIFI:T:' + cifrado + ';S:' + ssid + ';P:' + clave + ';;';
                }
                case 'correo': {
                    var dir = document.getElementById('entrada-correo-direccion').value.trim();
                    var asunto = document.getElementById('entrada-correo-asunto').value.trim();
                    var cuerpo = document.getElementById('entrada-correo-cuerpo').value.trim();
                    if (!dir) return '';
                    var mailto = 'mailto:' + dir;
                    var params = [];
                    if (asunto) params.push('subject=' + encodeURIComponent(asunto));
                    if (cuerpo) params.push('body=' + encodeURIComponent(cuerpo));
                    if (params.length) mailto += '?' + params.join('&');
                    return mailto;
                }
                case 'telefono': {
                    var tel = document.getElementById('entrada-telefono').value.trim();
                    if (!tel) return '';
                    return 'tel:' + tel;
                }
                default:
                    return '';
            }
        }

        // ===== Etiqueta de tipo =====
        function etiquetaTipo(tipo) {
            var etiquetas = { texto: 'Texto', url: 'Enlace', wifi: 'WiFi', correo: 'Correo', telefono: 'Telefono' };
            return etiquetas[tipo] || tipo;
        }

        // ===== Generar QR =====
        function generarQR() {
            var datos = obtenerDatosQR();
            if (!datos) {
                mostrarToast('Escribe algo antes de generar', 'error');
                return;
            }

            // Limpiar salida anterior
            salidaQR.innerHTML = '';

            var tamano = parseInt(sliderTamano.value);

            try {
                instanciaQR = new QRCode(salidaQR, {
                    text: datos,
                    width: tamano,
                    height: tamano,
                    colorDark: colorFrente.value,
                    colorLight: colorFondo.value,
                    correctLevel: QRCode.CorrectLevel.H
                });

                // Mostrar botones de accion
                botonesAccion.style.display = 'flex';

                // Cambiar fondo del marco segun color del QR
                marcoQR.style.background = colorFondo.value;

                // Actualizar total
                totalGenerados++;
                statTotal.textContent = totalGenerados;
                localStorage.setItem('qr_total', totalGenerados.toString());

                // Agregar al historial
                agregarAlHistorial(datos);

                mostrarToast('Codigo QR generado con exito', 'exito');

                // Efecto de escala
                marcoQR.style.transform = 'scale(0.94)';
                setTimeout(function() { marcoQR.style.transform = 'scale(1)'; }, 220);

            } catch (e) {
                mostrarToast('Error al generar. Intenta con menos texto.', 'error');
            }
        }

        btnGenerar.addEventListener('click', generarQR);

        // ===== Enter para generar =====
        document.querySelectorAll('input[type="text"], input[type="url"]').forEach(function(inp) {
            inp.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') generarQR();
            });
        });

        // ===== Descargar QR =====
        btnDescargar.addEventListener('click', function() {
            var canvas = salidaQR.querySelector('canvas');
            var img = salidaQR.querySelector('img');

            if (canvas) {
                descargarDesdeCanvas(canvas);
            } else if (img) {
                var tempCanvas = document.createElement('canvas');
                tempCanvas.width = img.naturalWidth || img.width;
                tempCanvas.height = img.naturalHeight || img.height;
                tempCanvas.getContext('2d').drawImage(img, 0, 0);
                descargarDesdeCanvas(tempCanvas);
            } else {
                mostrarToast('No hay QR para descargar', 'error');
            }
        });

        function descargarDesdeCanvas(canvas) {
            var link = document.createElement('a');
            link.download = 'qr-' + tipoActual + '-' + Date.now() + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            mostrarToast('QR descargado como PNG', 'exito');
        }

        // ===== Copiar QR =====
        btnCopiar.addEventListener('click', async function() {
            var canvas = salidaQR.querySelector('canvas');
            var img = salidaQR.querySelector('img');

            var sourceCanvas = canvas;
            if (!canvas && img) {
                sourceCanvas = document.createElement('canvas');
                sourceCanvas.width = img.naturalWidth || img.width;
                sourceCanvas.height = img.naturalHeight || img.height;
                sourceCanvas.getContext('2d').drawImage(img, 0, 0);
            }

            if (!sourceCanvas) {
                mostrarToast('No hay QR para copiar', 'error');
                return;
            }

            try {
                var blob = await new Promise(function(resolve) {
                    sourceCanvas.toBlob(resolve, 'image/png');
                });
                await navigator.clipboard.write([
                    new ClipboardItem({ 'image/png': blob })
                ]);
                mostrarToast('QR copiado al portapapeles', 'exito');
            } catch (e) {
                mostrarToast('No se pudo copiar. Intenta descargar.', 'info');
            }
        });

        // ===== Historial =====
        function agregarAlHistorial(datos) {
            // Generar mini QR
            var tempDiv = document.createElement('div');
            new QRCode(tempDiv, {
                text: datos,
                width: 80,
                height: 80,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.M
            });

            setTimeout(function() {
                var canvas = tempDiv.querySelector('canvas');
                var imgSrc = canvas ? canvas.toDataURL('image/png') : '';

                var entrada = {
                    id: Date.now(),
                    tipo: tipoActual,
                    datos: datos,
                    imgSrc: imgSrc,
                    hora: new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' })
                };

                historial.unshift(entrada);
                if (historial.length > 12) historial.pop();

                // Guardar en localStorage
                try {
                    localStorage.setItem('qr_historial', JSON.stringify(historial));
                } catch(e) { /* si excede cuota, no pasa nada */ }

                renderizarHistorial();
            }, 150);
        }

        function renderizarHistorial() {
            if (historial.length === 0) {
                grillaHistorial.innerHTML = '<div class="historial-vacio"><i class="fas fa-inbox"></i>Tus codigos QR generados apareceran aqui</div>';
                btnLimpiarHistorial.style.display = 'none';
                return;
            }

            btnLimpiarHistorial.style.display = 'inline-flex';

            var html = '';
            for (var i = 0; i < historial.length; i++) {
                var entry = historial[i];
                html += '<div class="item-historial" data-indice="' + i + '" tabindex="0" role="button" aria-label="Restaurar QR">';
                html += '<img src="' + entry.imgSrc + '" alt="QR">';
                html += '<div class="texto-hist" title="' + entry.datos.replace(/"/g, '&quot;') + '">' + entry.datos + '</div>';
                html += '<div class="tipo-hist">' + etiquetaTipo(entry.tipo) + ' &middot; ' + entry.hora + '</div>';
                html += '</div>';
            }
            grillaHistorial.innerHTML = html;

            // Eventos click en historial
            var items = grillaHistorial.querySelectorAll('.item-historial');
            items.forEach(function(item) {
                function restaurar() {
                    var idx = parseInt(item.getAttribute('data-indice'));
                    var entry = historial[idx];
                    if (!entry) return;

                    // Cambiar pestanna
                    tipoActual = entry.tipo;
                    pestannas.forEach(function(p) {
                        p.classList.remove('activa');
                        p.setAttribute('aria-selected', 'false');
                        if (p.getAttribute('data-tipo') === tipoActual) {
                            p.classList.add('activa');
                            p.setAttribute('aria-selected', 'true');
                        }
                    });
                    paneles.forEach(function(p) { p.classList.remove('activa'); });
                    var panel = document.getElementById('panel-' + tipoActual);
                    if (panel) panel.classList.add('activa');

                    // Llenar inputs
                    switch (tipoActual) {
                        case 'texto':
                            entradaTexto.value = entry.datos;
                            entradaTexto.dispatchEvent(new Event('input'));
                            break;
                        case 'url':
                            document.getElementById('entrada-url').value = entry.datos;
                            break;
                        case 'wifi':
                            var ssidMatch = entry.datos.match(/S:([^;]*)/);
                            var passMatch = entry.datos.match(/P:([^;]*)/);
                            var encMatch = entry.datos.match(/T:([^;]*)/);
                            if (ssidMatch) document.getElementById('entrada-wifi-nombre').value = ssidMatch[1];
                            if (passMatch) document.getElementById('entrada-wifi-clave').value = passMatch[1];
                            if (encMatch) document.getElementById('entrada-wifi-cifrado').value = encMatch[1];
                            break;
                        case 'correo':
                            var correoData = entry.datos.replace('mailto:', '');
                            var correoParts = correoData.split('?');
                            document.getElementById('entrada-correo-direccion').value = correoParts[0];
                            if (correoParts[1]) {
                                var params = new URLSearchParams(correoParts[1]);
                                document.getElementById('entrada-correo-asunto').value = params.get('subject') || '';
                                document.getElementById('entrada-correo-cuerpo').value = params.get('body') || '';
                            }
                            break;
                        case 'telefono':
                            document.getElementById('entrada-telefono').value = entry.datos.replace('tel:', '');
                            break;
                    }

                    generarQR();
                    mostrarToast('QR restaurado del historial', 'info');
                }

                item.addEventListener('click', restaurar);
                item.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); restaurar(); }
                });
            });
        }

        // Renderizar historial al cargar
        renderizarHistorial();

        // Limpiar historial
        btnLimpiarHistorial.addEventListener('click', function() {
            historial = [];
            localStorage.removeItem('qr_historial');
            renderizarHistorial();
            mostrarToast('Historial limpiado', 'info');
        });

        // ===== Atajo Ctrl+Enter =====
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                generarQR();
            }
        });

        // ===== Auto-generar con debounce =====
        var autoGenTimeout = null;
        function configurarAutoGen(elemento) {
            if (!elemento) return;
            elemento.addEventListener('input', function() {
                clearTimeout(autoGenTimeout);
                autoGenTimeout = setTimeout(function() {
                    var datos = obtenerDatosQR();
                    if (datos && datos.length > 2) {
                        generarQR();
                    }
                }, 900);
            });
        }

        configurarAutoGen(entradaTexto);
        configurarAutoGen(document.getElementById('entrada-url'));
        configurarAutoGen(document.getElementById('entrada-wifi-nombre'));
        configurarAutoGen(document.getElementById('entrada-wifi-clave'));
        configurarAutoGen(document.getElementById('entrada-correo-direccion'));
        configurarAutoGen(document.getElementById('entrada-telefono'));

        // ===== Efecto 3D en marco QR =====
        marcoQR.addEventListener('mousemove', function(e) {
            var rect = marcoQR.getBoundingClientRect();
            var x = ((e.clientX - rect.left) / rect.width - 0.5) * 10;
            var y = ((e.clientY - rect.top) / rect.height - 0.5) * 10;
            marcoQR.style.transform = 'perspective(600px) rotateY(' + x + 'deg) rotateX(' + (-y) + 'deg)';
        });
        marcoQR.addEventListener('mouseleave', function() {
            marcoQR.style.transform = 'perspective(600px) rotateY(0deg) rotateX(0deg)';
        });

        // ===== Focus visible para accesibilidad =====
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') document.body.classList.add('nav-teclado');
        });
        document.addEventListener('mousedown', function() {
            document.body.classList.remove('nav-teclado');
        });
    </script>
</body>
</html>
